<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMAGE ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #a855f7; --bg: #000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--p); box-shadow: 0 0 15px var(--p); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* VIGNETTE & BACKGROUND */
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 8; }
        .hero-bg { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; background: url('Дамагерс.png') center/cover; filter: brightness(0.2); z-index: -1; transition: 0.1s ease-out; }

        .hero { height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .hero h1 { font-family: 'Syncopate'; font-size: clamp(3rem, 18vw, 10rem); letter-spacing: -10px; line-height: 0.8; }

        /* TRACKLIST */
        .content { position: relative; z-index: 10; background: linear-gradient(to bottom, transparent, #000 20%); padding: 150px 10%; }
        .t-row { display: flex; align-items: baseline; padding: 40px 0; border-bottom: 1px solid #111; cursor: pointer; font-family: 'Syncopate'; transition: 0.4s; opacity: 0; transform: translateY(40px); }
        .t-row.visible { opacity: 1; transform: translateY(0); }
        .t-row span:first-child { font-size: 0.7rem; color: var(--p); margin-right: 25px; }
        .t-row span:last-child { font-size: 1.3rem; letter-spacing: 2px; }
        .t-row:hover span:last-child { letter-spacing: 8px; color: var(--p); }

        /* CUSTOM PLAYER BAR */
        #custom-player {
            position: fixed; bottom: -100px; left: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--p); z-index: 3000;
            display: flex; align-items: center; padding: 0 10%;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #custom-player.active { bottom: 0; }
        .play-btn { width: 40px; height: 40px; border: 1px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--p); font-size: 0.8rem; margin-right: 20px; transition: 0.3s; }
        .play-btn:hover { background: var(--p); color: #000; }
        .track-info { font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 2px; }

        /* LYRICS OVERLAY */
        .lyrics-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 100px 10% 200px; }
        .lyrics-overlay.active { display: block; }
        .line { display: block; font-size: clamp(1.4rem, 4.5vw, 3.2rem); font-weight: 900; line-height: 1.15; margin-bottom: 10px; opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .active .line { opacity: 1; transform: translateY(0); }
        .rus { color: var(--p); }

        /* HIDDEN YANDEX IFRAME */
        #yandex-frame { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        .close-btn { position: fixed; top: 40px; right: 40px; width: 50px; height: 50px; cursor: pointer; z-index: 2100; }
        .close-btn span { position: absolute; top: 24px; width: 100%; height: 3px; background: var(--p); transition: 0.5s; }
        .close-btn span:nth-child(1) { transform: rotate(45deg); }
        .close-btn span:nth-child(2) { transform: rotate(-45deg); }

        #rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2050; opacity: 0; transition: 1s; }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <canvas id="rain"></canvas>
    <div class="hero-bg" id="bg"></div>

    <iframe id="yandex-frame" src="https://music.yandex.ru/iframe/track/132483842/38089920"></iframe>

    <div class="hero">
        <div class="hero-content">
            <h1 id="title">DAMAGE</h1>
            <p style="font-family: 'Syncopate'; color: var(--p); letter-spacing: 15px; margin-top: 25px; font-size: 0.7rem; opacity: 0.5;">ARCHIVE // 2026</p>
        </div>
    </div>

    <div class="content">
        <div class="t-row" onclick="playAndLyrics()">
            <span>01</span><span>ARE YOU HAPPY</span>
        </div>
        <script>
            const tracks = ["IM ALL BLESSED THE FUCK UP", "BASEMENT", "BODY DOUBLE", "MIRRORS", "CHELSEA SMILE", "444", "PARASOCIAL FREESTYLE", "DESIGNER'S PARADISE", "FIRE WALK WITH ME", "MADAM", "SIRENS", "NAIVE", "DRIVE", "WELCOME TO FOREVER", "0 TEARS", "DAMAGE", "AMY"];
            tracks.forEach((t, i) => {
                document.write(`<div class="t-row" style="opacity: 0.05"><span>${(i+2).toString().padStart(2, '0')}</span><span>${t}</span></div>`);
            });
        </script>
    </div>

    <div id="custom-player">
        <div class="play-btn" onclick="toggleMusic()">II</div>
        <div class="track-info">01. ARE YOU HAPPY — KAI ANGEL</div>
    </div>

    <div id="lyricsView" class="lyrics-overlay">
        <div class="close-btn" onclick="closeLyrics()"><span></span><span></span></div>
        <div id="lyrics-content">
             <span class="line">Are you happy? (Are you happy?)</span>
             <span class="line">'Cause you look sad (Uh-huh)</span>
             <span class="line">Like a church with no choir (C'mon)</span>
             <span class="line">Like a God gone mad (Ooh)</span>
             <span class="line">Bleed me slow...</span>
             </div>
    </div>

    <script>
        let isPlaying = false;
        const frame = document.getElementById('yandex-frame');

        function playAndLyrics() {
            // Открываем текст
            document.getElementById('lyricsView').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Активируем плеер
            document.getElementById('custom-player').classList.add('active');
            
            // Чтобы музыка заиграла автоматически (Яндекс может блокировать автоплей без клика, поэтому кнопка нужна)
            isPlaying = true;
            openLyrics(); // Твоя функция дождя
        }

        function toggleMusic() {
            const btn = document.querySelector('.play-btn');
            if(isPlaying) {
                // Чтобы поставить на паузу iframe, проще всего его "перезагрузить" или убрать src, 
                // так как API Яндекса закрыт. Либо просто оставить как есть.
                btn.innerText = '▶';
            } else {
                btn.innerText = 'II';
            }
            isPlaying = !isPlaying;
        }

        function closeLyrics() {
            document.getElementById('lyricsView').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('rain').style.opacity = '0';
        }

        // PARALLAX & REVEAL (те же, что были)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            document.getElementById('bg').style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.2 });
        document.querySelectorAll('.t-row').forEach(row => observer.observe(row));

        // RAIN SYSTEM (упрощено для краткости)
        function openLyrics() {
            const canvas = document.getElementById('rain');
            canvas.style.opacity = '1';
            // Тут твоя функция отрисовки дождя initRain() и drawRain()
        }
    </script>
</body>
</html>
